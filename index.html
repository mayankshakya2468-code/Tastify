<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Restaurant Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>


<body>

    <!-- Header and Navigation -->
    <header class="header">
        <nav class="container header-content">
            <div class="logo-container">
                <span class="logo">Tastify</span>
            </div>
            <div class="cart-container">
                <button id="cart-button" class="cart-button">
                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                    <span id="cart-item-count" class="cart-item-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <div class="hero">
        <h1>Italiano Ristorante</h1>
        <p>Taste the Tradition</p>
        <a href="#menu-container">View Our Menu</a>
    </div>

    <!-- Menu Category Navigation -->
    <nav id="menu-tabs" class="sticky-menu-bar">
        <div class="container menu-tabs-inner">
            <!-- Categories will be injected here by JS -->
        </div>
    </nav>

    <!-- Main Menu Content -->
    <main id="menu-container" class="container menu-container">
        <!-- Menu sections will be dynamically loaded here by JS -->
    </main>

    <!-- Cart Modal (initially hidden) -->
    <div id="cart-modal" class="cart-modal-overlay">
        <div class="cart-modal">
            <h2 class="cart-modal-title">Your Order</h2>
            <div id="cart-items" class="cart-items">
                <!-- Cart items will be dynamically added here -->
            </div>
            <div class="cart-total-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <form id="order-form" class="order-form">
                    <input type="text" id="customer-name" placeholder="Your Name" required class="order-input">
                    <input type="tel" id="mobile-number" placeholder="Your WhatsApp Mobile No." pattern="[0-9]{10}" required class="order-input">
                    <input type="text" id="table-number" placeholder="Table Number" required class="order-input">
                    <p class="order-info">Payment will be handled at the counter. Your receipt will be sent to your WhatsApp number.</p>
                    <button type="submit" class="place-order-btn">
                        Send Order on WhatsApp
                    </button>
                </form>
                <div id="receipt-message" class="receipt-message">
                    <p>Your order is ready to be sent to our WhatsApp. Please check your device to confirm and send the message.</p>
                </div>
            </div>
            <button id="close-cart" class="close-cart-btn">
                <i class="fa-solid fa-xmark close-cart-icon"></i>
            </button>
        </div>
    </div>















    <script>
        // Data for the menu
        const menuData = [
            {
                category: 'Starters',
                dishes: [
                    { id: 'starter1', name: 'Bruschetta', description: 'Grilled bread with tomatoes, basil, and garlic.', price:8.50, image: 'album/1.jpg' },
                    { id: 'starter2', name: 'Caprese Skewers', description: 'Cherry tomatoes, fresh mozzarella, and basil.', price: 9.00, image: 'album/2.jpg' }
                ]
            },
            {
                category: 'Italian',
                dishes: [
                    { id: 'italian1', name: 'Spaghetti Carbonara', description: 'Creamy egg, guanciale, pecorino romano.', price: 16.00, image: 'album/3.jpg' },
                    { id: 'italian2', name: 'Fettuccine Alfredo', description: 'Rich parmesan cream sauce.', price: 15.50, image: 'album/4.jpg' },
                    { id: 'italian3', name: 'Lasagna', description: 'Layers of pasta, meat ragù, and béchamel.', price: 17.00, image: 'album/5.jpg' }
                ]
            },
            {
                category: 'Main Courses',
                dishes: [
                    { id: 'main1', name: 'Grilled Salmon', description: 'Served with roasted vegetables and lemon sauce.', price: 22.00, image: 'album/6.jpg' },
                    { id: 'main2', name: 'Chicken Parmesan', description: 'Breaded chicken breast with marinara and mozzarella.', price: 18.50, image: 'album/7.jpg' }
                ]
            },
            {
                category: 'Desserts',
                dishes: [
                    { id: 'dessert1', name: 'Tiramisu', description: 'Classic Italian dessert with coffee and mascarpone.', price: 7.00, image: 'album/8.jpg' },
                    { id: 'dessert2', name: 'Panna Cotta', description: 'Creamy vanilla pudding with berry compote.', price: 6.50, image: 'album/9.jpg' }
                ]
            },
            {
                category: 'Drinks',
                dishes: [
                    { id: 'drink1', name: 'Espresso', description: 'A shot of strong black coffee.', price: 3.00, image: 'album/10.jpg' },
                    { id: 'drink2', name: 'Fresh Orange Juice', description: 'Freshly squeezed juice.', price: 5.00, image: 'album/11.jpg' }
                ]
            }
        ];

        let cart = [];
        
        const menuTabs = document.getElementById('menu-tabs');
        const menuContainer = document.getElementById('menu-container');
        const cartButton = document.getElementById('cart-button');
        const cartModal = document.getElementById('cart-modal');
        const closeCartButton = document.getElementById('close-cart');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartTotalSpan = document.getElementById('cart-total');
        const cartItemCountSpan = document.getElementById('cart-item-count');
        const orderForm = document.getElementById('order-form');
        const receiptMessage = document.getElementById('receipt-message');

        // Function to render the menu categories and dishes
        function renderMenu() {
            // Render category tabs
            menuTabs.querySelector('div').innerHTML = menuData.map(section => `
                <button class="menu-tab" data-category="${section.category}">
                    ${section.category}
                </button>
            `).join('');

            // Render all menu sections
            menuContainer.innerHTML = menuData.map(section => `
                <section id="${section.category.replace(/\s/g, '-')}" class="menu-section">
                    <h2>${section.category}</h2>
                    <div class="dish-grid">
                        ${section.dishes.map(dish => `
                            <div class="dish-card">
                                <img src="${dish.image}" alt="${dish.name}" class="dish-image">
                                <div class="dish-content">
                                    <h3 class="dish-name">${dish.name}</h3>
                                    <p class="dish-description">${dish.description}</p>
                                    <div class="dish-footer">
                                        <span class="dish-price">Rs.${dish.price.toFixed(2)}</span>
                                        <button data-id="${dish.id}" class="add-to-cart">
                                            Add to Order
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `).join('');

            // Attach event listeners for Add to Cart buttons
            document.querySelectorAll('.add-to-cart').forEach(button => {
                button.addEventListener('click', (e) => {
                    const dishId = e.target.dataset.id;
                    addToCart(dishId);
                });
            });

            // Attach event listeners for menu tabs
            document.querySelectorAll('.menu-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    const category = e.target.dataset.category;
                    const targetSection = document.getElementById(category.replace(/\s/g, '-'));
                    if (targetSection) {
                        // Get the offset of the sticky header and menu bar
                        const headerHeight = document.querySelector('.header').offsetHeight;
                        const menuBarHeight = document.getElementById('menu-tabs').offsetHeight;
                        const offset = headerHeight + menuBarHeight + 20; // 20px for extra spacing
                        
                        // Calculate the target scroll position
                        const targetPosition = targetSection.offsetTop - offset;
                        
                        // Smoothly scroll to the new position
                        window.scrollTo({
                            top: targetPosition,
                            behavior: 'smooth'
                        });
                    }
                    // Update active tab style
                    document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                });
            });

            // Intersection Observer to handle fade-in animations
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('show');
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            });

            document.querySelectorAll('.menu-section').forEach(section => {
                observer.observe(section);
            });
        }

        function addToCart(dishId) {
            const dish = menuData.flatMap(section => section.dishes).find(d => d.id === dishId);
            if (dish) {
                const existingItem = cart.find(item => item.id === dishId);
                if (existingItem) {
                    existingItem.quantity++;
                } else {
                    cart.push({ ...dish, quantity: 1 });
                }
                updateCartUI();

                // Add bounce animation to the cart count
                cartItemCountSpan.classList.add('bounce');
                setTimeout(() => {
                    cartItemCountSpan.classList.remove('bounce');
                }, 600);
            }
        }

        function removeFromCart(dishId) {
            const itemIndex = cart.findIndex(item => item.id === dishId);
            if (itemIndex > -1) {
                cart.splice(itemIndex, 1);
            }
            updateCartUI();
        }

        function updateCartUI() {
            cartItemsContainer.innerHTML = '';
            let total = 0;
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="order-info">Your cart is empty.</p>';
                cartTotalSpan.textContent = '$0.00';
            } else {
                cart.forEach(item => {
                    total += item.price * item.quantity;
                    const itemElement = document.createElement('div');
                    itemElement.className = 'cart-item';
                    itemElement.innerHTML = `
                        <div class="cart-item-info">
                            <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                            <div>
                                <h4 style="font-weight:600;">${item.quantity} x ${item.name}</h4>
                                <p style="font-size:0.875rem; color:#6b7280;">Rs.${item.price.toFixed(2)}</p>
                            </div>
                        </div>
                        <button data-id="${item.id}" class="remove-from-cart-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" style="height:1.25rem; width:1.25rem;" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm6 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    `;
                    cartItemsContainer.appendChild(itemElement);
                });
                cartTotalSpan.textContent = `Rs.${total.toFixed(2)}`;
            }

            // Update item count badge
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartItemCountSpan.textContent = totalItems;
            if (totalItems > 0) {
                cartItemCountSpan.style.opacity = '1';
            } else {
                cartItemCountSpan.style.opacity = '0';
            }

            // Re-attach event listeners for remove buttons
            document.querySelectorAll('.remove-from-cart-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    const dishId = e.currentTarget.dataset.id;
                    removeFromCart(dishId);
                });
            });
        }

        cartButton.addEventListener('click', () => {
            cartModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });

        closeCartButton.addEventListener('click', () => {
            cartModal.style.display = 'none';
            document.body.style.overflow = 'auto';
            receiptMessage.style.display = 'none';
            orderForm.style.display = 'flex';
        });

        orderForm.addEventListener('submit', (e) => {
            e.preventDefault();

            if (cart.length === 0) {
                return;
            }

            const customerName = document.getElementById('customer-name').value;
            const tableNumber = document.getElementById('table-number').value;
            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

            let message = `*New Order from Tastify*\n\n`;
            message += `*Customer:* ${customerName}\n`;
            message += `*Table No.:* ${tableNumber}\n\n`;
            message += `*Order Details:*\n`;
            
            cart.forEach(item => {
                message += `- ${item.quantity}x ${item.name} (Rs.${(item.price * item.quantity).toFixed(2)})\n`;
            });

            message += `\n*Total:* $${total.toFixed(2)}`;
            message += `\n\n_Payment will be handled at the counter._`;

            // Replace with your restaurant's mobile number, including the country code (e.g., '91' for India)
            const whatsappNumber = '917415475601'; // Replace with your restaurant's mobile number
            const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

            window.open(whatsappURL, '_blank');

            // Hide the form and show the confirmation message
            orderForm.style.display = 'none';
            receiptMessage.style.display = 'block';

            // Clear cart and form fields after a short delay
            setTimeout(() => {
                cart = [];
                updateCartUI();
                document.getElementById('customer-name').value = '';
                document.getElementById('mobile-number').value = '';
                document.getElementById('table-number').value = '';
                // Optional: hide modal after a longer delay or user action
                // cartModal.style.display = 'none';
            }, 3000);
        });

        // Initialize the app on window load
        window.onload = function() {
            renderMenu();
            updateCartUI();
        };
    </script>
</body>
</html>
